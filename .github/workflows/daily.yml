name: Daily Announcement Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "13 23 * * *"

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore seen announcements state
        uses: actions/cache/restore@v4
        with:
          path: state_seen.json
          key: seen-state-${{ github.ref_name }}
          restore-keys: |
            seen-state-${{ github.ref_name }}-

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pyyaml pypdf anthropic google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib playwright
          playwright install chromium --with-deps

      - name: Run agent
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-4-6
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          BROTHER_EMAIL: ${{ secrets.BROTHER_EMAIL }}
          SEEN_STATE_PATH: state_seen.json
        run: |
          python agent.py

      - name: Save seen announcements state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state_seen.json
          key: seen-state-${{ github.ref_name }}-${{ github.run_id }}
