name: Daily Announcement Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "13 23 * * *"

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore seen announcements state
        uses: actions/cache/restore@v4
        with:
          path: state_seen.json
          key: seen-state-${{ github.ref_name }}
          restore-keys: |
            seen-state-${{ github.ref_name }}-

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pyyaml pypdf openai playwright
          playwright install chromium

      - name: Run agent
        env:
          # ── Telegram (primary delivery) ────────────────────────────────
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # ── Email (optional fallback) ──────────────────────────────────
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          # ── OpenAI ─────────────────────────────────────────────────────
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # ── State ──────────────────────────────────────────────────────
          SEEN_STATE_PATH: state_seen.json
          # ── Optional: AR9 sibling alert ────────────────────────────────
          BROTHER_TELEGRAM_CHAT_ID: ${{ secrets.BROTHER_TELEGRAM_CHAT_ID }}
        run: |
          python agent.py

      - name: Save seen announcements state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state_seen.json
          key: seen-state-${{ github.ref_name }}-${{ github.run_id }}
