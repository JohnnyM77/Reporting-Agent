name: Sunday Sally Weekly Review

on:
  workflow_dispatch:
  schedule:
    # Sunday 08:00 Asia/Singapore = Sunday 00:00 UTC
    - cron: "0 0 * * 0"

jobs:
  sunday_sally_weekly_review:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Singapore
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r sunday-sally/requirements.txt

      - name: Run Sunday Sally
        working-directory: sunday-sally
        env:
          # ── Telegram (primary delivery) ────────────────────────────────
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # ── Email (optional fallback) ──────────────────────────────────
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          # ── Config ─────────────────────────────────────────────────────
          SALLY_CONFIG_PATH: config/settings.yaml
        run: |
          python -m src.main
