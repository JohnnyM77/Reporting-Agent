name: Selling Sally Weekly Review

on:
  workflow_dispatch:
  schedule:
    # Sunday 08:00 Asia/Singapore = Sunday 00:00 UTC
    - cron: "0 0 * * 0"

jobs:
  sunday_sally_weekly_review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Singapore
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r sunday-sally/requirements.txt

      - name: Run Selling Sally
        working-directory: sunday-sally
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          SALLY_CONFIG_PATH: config/settings.yaml
        run: |
          python -m src.main

      - name: Build dashboard
        run: python scripts/build_dashboard.py

      - name: Commit dashboard update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Dashboard update — Sally [skip ci]"
          git pull --rebase origin HEAD
          git push origin HEAD
