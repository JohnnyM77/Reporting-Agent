name: Wally Watchlist Screening

on:
  workflow_dispatch:
  schedule:
    # Tue/Fri (UTC) — all watchlists including TII75 run every scheduled execution
    - cron: "30 22 * * 2,5"

jobs:
  wally:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-wally.txt

      - name: Run all watchlists with combined email
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: run all with combined email (force TII75)
            python -m wally.main --all-combined --force
          else
            # Scheduled run (Tue or Fri): run all watchlists including TII75
            python -m wally.main --all-combined
          fi

      - name: Commit dashboard update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Commit only Wally's data JSON — no conflict possible with other agents
          git add docs/data/wally.json
          git diff --staged --quiet || git commit -m "Wally data [skip ci]"
          # Pull other agents' latest JSON files
          git pull --rebase origin HEAD
          # Rebuild HTML with all agents' combined data, then push
          python scripts/build_dashboard.py
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Dashboard update — Wally [skip ci]"
          git push origin HEAD
