# ──────────────────────────────────────────────────────────────────────────────
# ARB.AX — ARB Corporation  |  Value Chart Config
# Example for quality compounder (no norm_eps, higher multiples, lower sell trigger)
# ──────────────────────────────────────────────────────────────────────────────

ticker: ARB.AX
company_name: ARB Corporation
business: "4WD accessories manufacturer & retailer — Aus domestic + export"
exchange: ASX

stock_type: quality       # Quality compounder — normal P/E framework applies

buy_multiple: 20          # Only buy when market offers a reasonable entry multiple
sell_multiple: 35         # Quality compounders deserve premium; sell only when extreme
rror: 0.03                # Lower hurdle — quality business warrants lower yield requirement
norm_eps: null            # Not applicable for quality stocks — earnings don't mean-revert

chart:
  dimensions:
    width: 34
    height: 20

  left_axis:
    label: "Price (AUD $)"
    min: 0.0
    max: 60.0             # ARB trades $10–$50 range historically
    major_unit: 5.0
    num_fmt: '"$"#,##0.00'

  right_axis:
    label: "P/E Ratio"
    min: 0.0
    max: 50.0             # Quality stocks carry higher P/Es
    major_unit: 5.0
    num_fmt: "0.0"

  x_axis:
    num_fmt: "MMM-YY"
    tick_label_skip: 26
    tick_mark_skip: 26

  lines:
    price:
      color: "1565C0"
      width_emu: 9525
      style: solid
    value_buy:
      color: "1A5E20"
      width_emu: 19050
      style: dash
    value_sell:
      color: "C0392B"
      width_emu: 19050
      style: dash
    div_rror:
      color: "2E7D32"
      width_emu: 19050
      style: dash
    pe_smooth:
      color: "B8860B"
      width_emu: 15875
      style: solid

  pe_smooth_days: 60
  legend_position: "t"
  legend_overlay: true
  axis_title_box:
    fill: "FFFF00"
    border_color: "000000"
    border_width_emu: 9525
    text_bold: true
    text_color: "000000"
    font_size_pt: 9
  legend_box:
    fill: "FFFFFF"
    border_color: "404040"
    border_width_emu: 12700

price_data:
  frequency: weekly
  resample_day: "W-FRI"
  start_date: "2016-01-01"
  source_hint: "marketindex.com.au/asx/arb — export daily CSV (Date as YYYYMMDD)"
  stockhistory_formula: '=STOCKHISTORY("ARB.AX",DATE(2016,1,1),TODAY(),0,1,0,1)'

