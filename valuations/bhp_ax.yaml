# ──────────────────────────────────────────────────────────────────────────────
# BHP.AX — BHP Group Limited  |  Value Chart Config
# World's largest diversified miner — iron ore, copper, coal (divested), potash.
# Classic cyclical: EPS swings wildly with commodity prices.
# Use normalised through-cycle EPS for buy/sell decisions, not peak earnings.
# ──────────────────────────────────────────────────────────────────────────────

ticker: BHP.AX
company_name: BHP Group Limited
business: "Diversified mining — iron ore (largest), copper, nickel; potash (future); Pilbara + Olympic Dam"
exchange: ASX

stock_type: cyclical         # Classic commodity cyclical — 'low P/E = cheap' is INVERTED at peak

buy_multiple: 9             # Slow to buy: enter at trough/normalised earnings
sell_multiple: 16           # Even slower to sell: only at clearly stretched multiple
rror: 0.06                  # 6% — commodity/cyclical stocks warrant higher return hurdle
norm_eps: 250               # Through-cycle normalised EPS ~$2.50 (250 cents). Update as view evolves.

chart:
  dimensions:
    width: 34
    height: 20

  left_axis:
    label: "Price (AUD $)"
    min: 0.0
    max: 60.0             # BHP peaked ~$52 in FY2022; $60 gives headroom
    major_unit: 5.0
    num_fmt: '"$"#,##0.00'

  right_axis:
    label: "P/E Ratio"
    min: 0.0
    max: 20.0             # Cap at 20x — cyclicals rarely go beyond this on real earnings
    major_unit: 2.0
    num_fmt: "0.0"

  x_axis:
    num_fmt: "MMM-YY"
    tick_label_skip: 26
    tick_mark_skip: 26

  lines:
    price:
      color: "1565C0"
      width_emu: 9525
      style: solid
    value_buy:
      color: "1A5E20"
      width_emu: 19050
      style: dash
    value_sell:
      color: "C0392B"
      width_emu: 19050
      style: dash
    div_rror:
      color: "2E7D32"
      width_emu: 19050
      style: dash
    pe_smooth:
      color: "B8860B"
      width_emu: 15875
      style: solid

  pe_smooth_days: 60
  legend_position: "t"
  legend_overlay: true
  axis_title_box:
    fill: "FFFF00"
    border_color: "000000"
    border_width_emu: 9525
    text_bold: true
    text_color: "000000"
    font_size_pt: 9
  legend_box:
    fill: "FFFFFF"
    border_color: "404040"
    border_width_emu: 12700

price_data:
  frequency: weekly
  resample_day: "W-FRI"
  start_date: "2016-01-01"
  source_hint: "marketindex.com.au/asx/bhp — export daily CSV (Date as YYYYMMDD)"
  stockhistory_formula: '=STOCKHISTORY("BHP.AX",DATE(2016,1,1),TODAY(),0,1,0,1)'

