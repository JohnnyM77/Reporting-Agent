# ──────────────────────────────────────────────────────────────────────────────
# CPU.AX — Computershare Limited  |  Value Chart Config
# Global share registry and financial administration services.
# Quality compounder — recurring revenue from corporate actions and registry.
# Significant earnings uplift from high interest rates (margin income on client funds).
# Reports in USD; EPS below in AUD cents at prevailing exchange rates.
# ──────────────────────────────────────────────────────────────────────────────

ticker: CPU.AX
company_name: Computershare Limited
business: "Global share registry, employee equity plans, mortgage services, corporate trust; margin income on client funds"
exchange: ASX

stock_type: quality         # Quality compounder — dominant global share registry

buy_multiple: 18            # Buy at reasonable multiple (rates normalisation uncertainty)
sell_multiple: 30           # Sell at premium to fair value
rror: 0.03                  # 3% — moderate yield plus capital growth
norm_eps: null              # Quality compounder — no mean-reversion

chart:
  dimensions:
    width: 34
    height: 20

  left_axis:
    label: "Price (AUD $)"
    min: 0.0
    max: 35.0             # CPU peaked ~$30 in 2023; $35 gives headroom
    major_unit: 5.0
    num_fmt: '"$"#,##0.00'

  right_axis:
    label: "P/E Ratio"
    min: 0.0
    max: 40.0             # CPU can trade at elevated P/Es for quality financials
    major_unit: 5.0
    num_fmt: "0.0"

  x_axis:
    num_fmt: "MMM-YY"
    tick_label_skip: 26
    tick_mark_skip: 26

  lines:
    price:
      color: "1565C0"
      width_emu: 9525
      style: solid
    value_buy:
      color: "1A5E20"
      width_emu: 19050
      style: dash
    value_sell:
      color: "C0392B"
      width_emu: 19050
      style: dash
    div_rror:
      color: "2E7D32"
      width_emu: 19050
      style: dash
    pe_smooth:
      color: "B8860B"
      width_emu: 15875
      style: solid

  pe_smooth_days: 60
  legend_position: "t"
  legend_overlay: true
  axis_title_box:
    fill: "FFFF00"
    border_color: "000000"
    border_width_emu: 9525
    text_bold: true
    text_color: "000000"
    font_size_pt: 9
  legend_box:
    fill: "FFFFFF"
    border_color: "404040"
    border_width_emu: 12700

price_data:
  frequency: weekly
  resample_day: "W-FRI"
  start_date: "2016-01-01"
  source_hint: "marketindex.com.au/asx/cpu — export daily CSV (Date as YYYYMMDD)"
  stockhistory_formula: '=STOCKHISTORY("CPU.AX",DATE(2016,1,1),TODAY(),0,1,0,1)'

# ── Earnings history ──────────────────────────────────────────────────────────
