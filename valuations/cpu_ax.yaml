# CPU reports in USD; AUD cents estimated at prevailing FX.
# Use MANAGEMENT EPS (underlying/adjusted) — excludes acquisition amortisation.
# NOTE: FY2022-2024 EPS significantly boosted by margin income from high interest rates.
# All marked Est. — verify against Computershare ASX announcements.
