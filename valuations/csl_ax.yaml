# ──────────────────────────────────────────────────────────────────────────────
# CSL.AX — CSL Limited  |  Value Chart Config
# Global biotherapeutics leader — plasma-derived therapies (Behring), flu vaccines
# (Seqirus), haemophilia (Haegarda, Alhemo), iron deficiency (Ferinject/Vifor).
# Quality compounder — never cheap on P/E but has compounded strongly since 2010.
# Reports financials in USD; EPS below in AUD cents at prevailing exchange rate.
# ──────────────────────────────────────────────────────────────────────────────

ticker: CSL.AX
company_name: CSL Limited
business: "Global biotherapeutics — plasma (CSL Behring), vaccines (Seqirus), Vifor (iron/kidney disease)"
exchange: ASX

stock_type: quality         # Quality compounder — do NOT mean-revert; no norm_eps

buy_multiple: 25            # Buy at reasonable multiple for a quality biotech
sell_multiple: 45           # Sell only at extreme richness (rare for CSL to reach 45x)
rror: 0.02                  # 2% — quality compounder; low dividend but strong capital growth
norm_eps: null              # Not applicable for quality compounders

chart:
  dimensions:
    width: 34
    height: 20

  left_axis:
    label: "Price (AUD $)"
    min: 0.0
    max: 360.0            # CSL peaked ~$320 in 2021; $360 gives headroom
    major_unit: 30.0
    num_fmt: '"$"#,##0.00'

  right_axis:
    label: "P/E Ratio"
    min: 0.0
    max: 60.0             # Quality biotech can reach very high P/Es
    major_unit: 5.0
    num_fmt: "0.0"

  x_axis:
    num_fmt: "MMM-YY"
    tick_label_skip: 26
    tick_mark_skip: 26

  lines:
    price:
      color: "1565C0"
      width_emu: 9525
      style: solid
    value_buy:
      color: "1A5E20"
      width_emu: 19050
      style: dash
    value_sell:
      color: "C0392B"
      width_emu: 19050
      style: dash
    div_rror:
      color: "2E7D32"
      width_emu: 19050
      style: dash
    pe_smooth:
      color: "B8860B"
      width_emu: 15875
      style: solid

  pe_smooth_days: 60
  legend_position: "t"
  legend_overlay: true
  axis_title_box:
    fill: "FFFF00"
    border_color: "000000"
    border_width_emu: 9525
    text_bold: true
    text_color: "000000"
    font_size_pt: 9
  legend_box:
    fill: "FFFFFF"
    border_color: "404040"
    border_width_emu: 12700

price_data:
  frequency: weekly
  resample_day: "W-FRI"
  start_date: "2016-01-01"
  source_hint: "marketindex.com.au/asx/csl — export daily CSV (Date as YYYYMMDD)"
  stockhistory_formula: '=STOCKHISTORY("CSL.AX",DATE(2016,1,1),TODAY(),0,1,0,1)'

