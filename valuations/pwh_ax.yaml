# ──────────────────────────────────────────────────────────────────────────────
# PWH.AX — PWR Holdings Limited  |  Value Chart Config
# Niche manufacturer of high-performance cooling systems for motorsport, aerospace,
# defence, and automotive OEM. F1, NASCAR, IndyCar, military vehicles.
# Quality growth compounder — niche moat, recurring OEM relationships, expanding sectors.
# ──────────────────────────────────────────────────────────────────────────────

ticker: PWH.AX
company_name: PWR Holdings Limited
business: "High-performance cooling systems — Formula 1, NASCAR, IndyCar, military/defence, automotive OEM, aerospace"
exchange: ASX

stock_type: quality         # Quality niche growth — strong moat in high-performance cooling

buy_multiple: 25            # Buy at reasonable multiple for quality niche manufacturer
sell_multiple: 45           # Sell at extreme richness
rror: 0.02                  # 2% — modest dividend; growth focus
norm_eps: null              # Quality compounder — no cyclical mean-reversion

chart:
  dimensions:
    width: 34
    height: 20

  left_axis:
    label: "Price (AUD $)"
    min: 0.0
    max: 20.0             # PWH peaked ~$14-15 AUD; $20 gives ample headroom
    major_unit: 2.0
    num_fmt: '"$"#,##0.00'

  right_axis:
    label: "P/E Ratio"
    min: 0.0
    max: 55.0             # Quality growth can trade at elevated P/Es
    major_unit: 5.0
    num_fmt: "0.0"

  x_axis:
    num_fmt: "MMM-YY"
    tick_label_skip: 26
    tick_mark_skip: 26

  lines:
    price:
      color: "1565C0"
      width_emu: 9525
      style: solid
    value_buy:
      color: "1A5E20"
      width_emu: 19050
      style: dash
    value_sell:
      color: "C0392B"
      width_emu: 19050
      style: dash
    div_rror:
      color: "2E7D32"
      width_emu: 19050
      style: dash
    pe_smooth:
      color: "B8860B"
      width_emu: 15875
      style: solid

  pe_smooth_days: 60
  legend_position: "t"
  legend_overlay: true
  axis_title_box:
    fill: "FFFF00"
    border_color: "000000"
    border_width_emu: 9525
    text_bold: true
    text_color: "000000"
    font_size_pt: 9
  legend_box:
    fill: "FFFFFF"
    border_color: "404040"
    border_width_emu: 12700

price_data:
  frequency: weekly
  resample_day: "W-FRI"
  start_date: "2016-01-01"
  source_hint: "marketindex.com.au/asx/pwh — export daily CSV (Date as YYYYMMDD)"
  stockhistory_formula: '=STOCKHISTORY("PWH.AX",DATE(2016,1,1),TODAY(),0,1,0,1)'

