# ──────────────────────────────────────────────────────────────────────────────
# RMD.AX — ResMed Inc.  |  Value Chart Config
# Global leader in sleep apnea (CPAP), respiratory care, digital health.
# ASX CDIs are at 10:1 ratio to NYSE shares (1 CDI = 0.1 NYSE share).
# All EPS and dividend figures below are per ASX CDI (i.e., 1/10th of NYSE figure).
# Reports in USD; AUD values estimated at prevailing exchange rates.
# ──────────────────────────────────────────────────────────────────────────────

ticker: RMD.AX
company_name: ResMed Inc.
business: "Sleep apnea (CPAP/APAP devices + masks), out-of-hospital respiratory care, SaaS (Brightree/MatrixCare)"
exchange: ASX

stock_type: quality         # Quality compounder — market leader with recurring revenue

buy_multiple: 25            # Buy at reasonable multiple for quality health-tech
sell_multiple: 45           # Sell only at extreme richness
rror: 0.02                  # Low dividend; return is mostly capital growth
norm_eps: null              # Quality compounder — no mean-reversion assumption

chart:
  dimensions:
    width: 34
    height: 20

  left_axis:
    label: "Price (AUD $)"
    min: 0.0
    max: 45.0             # ASX CDI price; RMD.AX peaked ~$38-40 AUD
    major_unit: 5.0
    num_fmt: '"$"#,##0.00'

  right_axis:
    label: "P/E Ratio"
    min: 0.0
    max: 55.0             # Quality health-tech can trade at elevated P/Es
    major_unit: 5.0
    num_fmt: "0.0"

  x_axis:
    num_fmt: "MMM-YY"
    tick_label_skip: 26
    tick_mark_skip: 26

  lines:
    price:
      color: "1565C0"
      width_emu: 9525
      style: solid
    value_buy:
      color: "1A5E20"
      width_emu: 19050
      style: dash
    value_sell:
      color: "C0392B"
      width_emu: 19050
      style: dash
    div_rror:
      color: "2E7D32"
      width_emu: 19050
      style: dash
    pe_smooth:
      color: "B8860B"
      width_emu: 15875
      style: solid

  pe_smooth_days: 60
  legend_position: "t"
  legend_overlay: true
  axis_title_box:
    fill: "FFFF00"
    border_color: "000000"
    border_width_emu: 9525
    text_bold: true
    text_color: "000000"
    font_size_pt: 9
  legend_box:
    fill: "FFFFFF"
    border_color: "404040"
    border_width_emu: 12700

price_data:
  frequency: weekly
  resample_day: "W-FRI"
  start_date: "2016-01-01"
  source_hint: "marketindex.com.au/asx/rmd — export daily CSV (Date as YYYYMMDD)"
  stockhistory_formula: '=STOCKHISTORY("RMD.AX",DATE(2016,1,1),TODAY(),0,1,0,1)'

