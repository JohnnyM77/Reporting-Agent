# ──────────────────────────────────────────────────────────────────────────────
# SEK.AX — SEEK Limited  |  Value Chart Config
# Australia's dominant online job-ads marketplace.
# Quality compounder — heavy investment phase 2020-2024 depressed statutory EPS;
# use underlying EPS throughout (excludes impairments on international assets).
# ──────────────────────────────────────────────────────────────────────────────

ticker: SEK.AX
company_name: SEEK Limited
business: "Online job-ads marketplace — dominant in AU/NZ; also Asia Pacific via Jobstreet/Jobsdb"
exchange: ASX

stock_type: quality       # Quality compounder — monopoly-like domestic position

buy_multiple: 20          # Only buy at reasonable multiple given structural growth tailwinds
sell_multiple: 40         # Quality digital marketplace deserves premium; sell only when extreme
rror: 0.03                # Lower hurdle — high-quality recurring revenue business
norm_eps: null            # Not applicable — don't mean-revert quality compounders

chart:
  dimensions:
    width: 34
    height: 20

  left_axis:
    label: "Price (AUD $)"
    min: 0.0
    max: 40.0             # SEK peaked ~$37 in late 2021; $40 gives headroom
    major_unit: 5.0
    num_fmt: '"$"#,##0.00'

  right_axis:
    label: "P/E Ratio"
    min: 0.0
    max: 60.0             # Tech/marketplace stocks carry high P/Es
    major_unit: 5.0
    num_fmt: "0.0"

  x_axis:
    num_fmt: "MMM-YY"
    tick_label_skip: 26
    tick_mark_skip: 26

  lines:
    price:
      color: "1565C0"
      width_emu: 9525
      style: solid
    value_buy:
      color: "1A5E20"
      width_emu: 19050
      style: dash
    value_sell:
      color: "C0392B"
      width_emu: 19050
      style: dash
    div_rror:
      color: "2E7D32"
      width_emu: 19050
      style: dash
    pe_smooth:
      color: "B8860B"
      width_emu: 15875
      style: solid

  pe_smooth_days: 60
  legend_position: "t"
  legend_overlay: true
  axis_title_box:
    fill: "FFFF00"
    border_color: "000000"
    border_width_emu: 9525
    text_bold: true
    text_color: "000000"
    font_size_pt: 9
  legend_box:
    fill: "FFFFFF"
    border_color: "404040"
    border_width_emu: 12700

price_data:
  frequency: weekly
  resample_day: "W-FRI"
  start_date: "2016-01-01"
  source_hint: "marketindex.com.au/asx/sek — export daily CSV (Date as YYYYMMDD)"
  stockhistory_formula: '=STOCKHISTORY("SEK.AX",DATE(2016,1,1),TODAY(),0,1,0,1)'

